<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mavver</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero-wrapper">
    <div class="hero-grid" id="grid"></div>
    <div class="hero-overlay"></div>

    <div class="bio-content">
        <h1>это страница маввера</h1>
        <p>это реально очень классный чувак</p>
    </div>
</div>

<script>
const images = {{IMAGES}};
const grid = document.getElementById('grid');
let items = [];
const gap = 10;
const speed = window.innerWidth < 600 ? 1.5 : 0.5;

function getColumnCount() {
    const w = window.innerWidth;
    if(w < 600) return 2;
    if(w < 900) return 3;
    if(w < 1200) return 4;
    return 6;
}

function getRandomHeight(width, ratio){
    const minH = width * ratio * 0.9;
    const maxH = width * ratio * 1.1;
    return minH + Math.random()*(maxH-minH);
}

function setupGrid(){
    const colCount = getColumnCount();
    const colWidth = (window.innerWidth - gap*(colCount+1)) / colCount;
    const colBottoms = Array(colCount).fill(gap);

    let loadedCount = 0;

    images.sort(()=>Math.random()-0.5).forEach((src, index)=>{
        const div = document.createElement('div');
        div.className = 'item';

        const blur = document.createElement('img');
        blur.src = `blur/${src}`;
        blur.className = 'blur';

        const full = document.createElement('img');
        full.src = `assets/${src}`;
        full.className = 'full';
        full.style.opacity = '0';

        div.appendChild(blur);
        div.appendChild(full);
        div.style.position = 'absolute';
        grid.appendChild(div);

        full.onload = ()=>{
            // ... (твой существующий код расчета высоты и позиции) ...
            const ratio = full.naturalHeight / full.naturalWidth;
            const width = colWidth;
            const height = width * ratio; // Упростил для примера

            div.style.width = `${width}px`;
            div.style.height = `${height}px`;

            const minCol = colBottoms.indexOf(Math.min(...colBottoms));
            const x = gap + minCol * (colWidth + gap);
            const y = colBottoms[minCol];
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            div.dataset.col = minCol;
            colBottoms[minCol] += height + gap;

            items.push(div);

            setTimeout(()=>{ full.style.opacity = '1'; div.classList.add('loaded'); }, index*50);

            loadedCount++;

            // ИСПРАВЛЕНИЕ ТУТ:
            // Если это первая загруженная картинка — запускаем цикл анимации
            if(loadedCount === 1){
                requestAnimationFrame(animateGrid);
            }
        }
    });
}

function animateGrid(){
    items.forEach(div => {
        // Достаем текущее значение top
        let top = parseFloat(div.style.top) - speed;
        const height = parseFloat(div.style.height);
        const col = parseInt(div.dataset.col);

        // Если картинка улетела вверх
        if(top + height < 0){
            const colItems = items.filter(d => parseInt(d.dataset.col) === col);
            const maxBottom = colItems.length ? Math.max(...colItems.map(d => parseFloat(d.style.top) + parseFloat(d.style.height))) : 0;
            top = maxBottom + gap;
        }

        div.style.top = `${top}px`;

        // Добавь эту строку для аппаратного ускорения на телефонах:
        div.style.transform = 'translateZ(0)';
    });

    requestAnimationFrame(animateGrid);
}

window.addEventListener('load', ()=>{ setupGrid(); });

window.addEventListener('resize', ()=>{
    items.forEach(i=>i.remove());
    items = [];
    setupGrid();
});

window.addEventListener('orientationchange', ()=>{
    items.forEach(i=>i.remove());
    items = [];
    setupGrid();
});
</script>
</body>
</html>
