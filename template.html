<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mavver</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero-wrapper">
    <div class="hero-grid" id="grid"></div>
    <div class="hero-overlay"></div>

    <div class="bio-content">
        <h1>это страница маввера</h1>
        <p>это реально очень классный чувак</p>
    </div>
</div>

<script>
const images = {{IMAGES}};
const grid = document.getElementById('grid');
let items = [];
const gap = 10;

function getColumnCount(){
    const w = window.innerWidth;
    if(w < 600) return 2;
    if(w < 900) return 3;
    if(w < 1200) return 4;
    return 6;
}

function getRandomHeight(width, ratio){
    const minH = width * ratio * 0.9;
    const maxH = width * ratio * 1.1;
    return minH + Math.random()*(maxH-minH);
}

function setupGrid(){
    const colCount = getColumnCount();
    const colWidth = (grid.clientWidth - gap*(colCount+1)) / colCount; // учитываем отступы слева/справа
    const colBottoms = Array(colCount).fill(gap); // отступ сверху

    images.sort(()=>Math.random()-0.5).forEach((src)=>{
        const div = document.createElement('div');
        div.className = 'item';

        const blur = document.createElement('img');
        blur.src = `blur/${src}`;
        blur.className = 'blur';

        const full = document.createElement('img');
        full.src = `assets/${src}`;
        full.className = 'full';

        div.appendChild(blur);
        div.appendChild(full);

        div.style.position = 'absolute';
        grid.appendChild(div);

        full.onload = ()=>{
            const ratio = full.naturalHeight / full.naturalWidth;
            const width = colWidth;
            const height = getRandomHeight(width, ratio);

            div.style.width = `${width}px`;
            div.style.height = `${height}px`;

            const minCol = colBottoms.indexOf(Math.min(...colBottoms));
            const x = gap + minCol * (colWidth + gap); // + gap слева
            const y = colBottoms[minCol];
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;

            colBottoms[minCol] += height + gap; // + gap снизу
            items.push(div);

            div.classList.add('loaded');
        }
    });
}

let speed = 0.3;

function animateGrid(){
    items.forEach(div=>{
        let top = parseFloat(div.style.top) - speed;
        const height = parseFloat(div.style.height);
        const col = Math.round((parseFloat(div.style.left) - gap) / (parseFloat(div.style.width) + gap));

        if(top + height < 0){
            // возвращаем вниз с ровным отступом
            top = Math.max(...items.filter(d=>parseInt(d.dataset.col) === col).map(d=>parseFloat(d.style.top) + parseFloat(d.style.height))) + gap || gap;
        }
        div.style.top = `${top}px`;
        div.dataset.col = col;
    });

    requestAnimationFrame(animateGrid);
}

setupGrid();
window.addEventListener('resize', ()=>{
    items.forEach(i=>i.remove());
    items = [];
    setupGrid();
});

animateGrid();
</script>
</body>
</html>
